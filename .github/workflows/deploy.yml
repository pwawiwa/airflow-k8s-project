name: Airflow DAG Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'dags/**'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow

      - name: Validate DAGs (Syntax Check)
        run: |
          echo "Validating DAGs..."
          for file in dags/*.py; do
            python "$file" || exit 1
          done
          echo "All DAGs passed syntax check."

      - name: Notify Deployment
        run: |
          echo "DAGs validated and pushed. Airflow git-sync will pull the changes."
