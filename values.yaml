# Simplified Airflow values for Docker Desktop
executor: KubernetesExecutor

# Disable examples
airflow:
  extraEnv:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"

# Use local postgres (bundled with chart)
postgresql:
  enabled: True

# Scheduler and Webserver
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

webserver:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

apiServer:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  # Give it more time to start up on local machine
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10

dagProcessor:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# DAGs configuration
dags:
  gitSync:
    enabled: true
    repo: https://github.com/pwawiwa/airflow-k8s-project.git
    branch: main
    subPath: "dags"
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: hostpath
    accessMode: ReadWriteOnce
